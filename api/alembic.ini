# Alembic configuration. Run from api/: `uv run alembic upgrade head`.
# The database URL is NOT configured here — env.py reads it from the app's
# Settings (DATABASE_URL in the repo-root .env locally, env vars in CI/prod),
# so migrations and the app can never disagree about which DB they target.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# Logging: alembic INFO (shows each migration as it runs), everything else WARNING.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
